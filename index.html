<!DOCTYPE html>
<html>
<head>
  <title>My First Animation</title>
  <style>
    body {
      background: black;
      text-align: center;
      color: white;
      font-size: 30px;
    }

    .box {
      width: 100px;
      height: 100px;
      background: lime;
      margin: 50px auto;
      animation: move 2s infinite alternate;
    }

    @keyframes move {
      from { transform: translateY(0); }
      to { transform: translateY(200px); }
    }
  </style>
</head>

<body>
  <h1>我的第一個動態網頁</h1>
  <div class="box"></div>
</body>
</html>
